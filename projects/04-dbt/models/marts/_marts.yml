version: 2

# Generic tests (khai báo) cho marts — dbt tự sinh SQL kiểm tra & chạy.
models:
  - name: dim_customer
    description: "Dimension khách hàng (surrogate key)."
    columns:
      - name: customer_key
        description: "Surrogate key."
        tests: [unique, not_null]
      - name: customer_id
        description: "Natural key."
        tests: [unique, not_null]

  - name: dim_product
    description: "Dimension sản phẩm (surrogate key + price_tier)."
    columns:
      - name: product_key
        tests: [unique, not_null]
      - name: product_id
        tests: [unique, not_null]
      - name: price_tier
        description: "Phân hạng giá."
        tests:
          - accepted_values:
              values: ['premium', 'mid', 'budget']

  - name: fct_sales
    description: "Fact bán hàng, grain order-item."
    columns:
      - name: customer_key
        description: "FK -> dim_customer."
        tests:
          - not_null
          - relationships:
              to: ref('dim_customer')
              field: customer_key
      - name: product_key
        description: "FK -> dim_product."
        tests:
          - not_null
          - relationships:
              to: ref('dim_product')
              field: product_key
      - name: status
        tests:
          - accepted_values:
              values: ['completed', 'shipped', 'cancelled', 'returned']

  - name: mart_revenue_by_category
    description: "Doanh thu theo category (completed)."
    columns:
      - name: category
        tests: [unique, not_null]

version: 2

# Sources đọc THẲNG file parquet trong data/raw/ (dbt-duckdb external_location).
# {name} được thay bằng tên bảng -> data/raw/<table>.parquet
sources:
  - name: raw
    description: "Dữ liệu thô e-commerce (parquet) — tầng landing/bronze."
    meta:
      external_location: "{{ env_var('DE_RAW', 'data/raw') }}/{name}.parquet"
    tables:
      - name: customers
      - name: products
      - name: orders
      - name: order_items
